name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 🐳 Login Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🏗 Build Docker image (IMPORTANT: correct path)
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mymvcapp:latest ./MyMvcApp

    # 📤 Push image
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mymvcapp:latest

    # 🚀 Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop mymvcapp || true
          docker rm mymvcapp || true
          docker system prune -f || true
          docker pull ${{ secrets.DOCKER_USERNAME }}/mymvcapp:latest
          docker run -d -p 80:8080 --restart always --name mymvcapp -e AWS__UserPoolClientSecret="${{ secrets.AWS_USER_POOL_CLIENT_SECRET }}" ${{ secrets.DOCKER_USERNAME }}/mymvcapp:latest